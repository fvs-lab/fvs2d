syntax = "proto3";

package fvs2d.control.v1;

option go_package = "fvs2d/internal/controlpb;controlpb";

// Control is the runtime control plane for a running fvs2d daemon.
//
// It is served only when the daemon is started with the -control flag and lets
// a supervisor (e.g. Bottles) introspect the mount and stop it cleanly without
// relying on POSIX signals.
service Control {
  // Health is a liveness probe; ok is always true when the server answers.
  rpc Health(HealthRequest) returns (HealthResponse);

  // GetStatus returns the current mount configuration and runtime info.
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);

  // Shutdown unmounts the FUSE filesystem and terminates the daemon.
  rpc Shutdown(ShutdownRequest) returns (ShutdownResponse);
}

message HealthRequest {}

message HealthResponse {
  bool ok = 1;
}

message GetStatusRequest {}

// Layer describes one lower layer selector of a stacked mount.
message Layer {
  string repo = 1;   // repo root containing .fvs2
  string state = 2;  // explicit state id/prefix selector, if any
  string branch = 3; // explicit branch selector, if any
}

message GetStatusResponse {
  string mountpoint = 1;       // FUSE mountpoint
  bool writable = 2;           // true when a writable upper layer is present
  string upper = 3;            // upper dir path (empty when read-only)
  repeated Layer layers = 4;   // lower layers, low-to-high (stacked mount)
  string repo = 5;             // single-repo mount: repo root
  string state = 6;            // single-repo mount: selected state id/prefix
  string branch = 7;           // single-repo mount: selected branch
  uint32 node_count = 8;       // number of nodes in the lower tree
  int32 block_size = 9;        // effective CoW block size
  bool debug = 10;             // daemon debug mode
  int32 pid = 11;              // daemon process id
  int64 uptime_seconds = 12;   // seconds since the daemon started serving
  string api_version = 13;     // control API version
}

message ShutdownRequest {
  // lazy requests a lazy unmount (detach now, clean up when no longer busy).
  // Use it when the mountpoint may still be in use by another process.
  bool lazy = 1;
}

message ShutdownResponse {
  bool ok = 1;
}
